name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build sip_periph Release (STM32F411CEUx)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Release
        run: make -j$(nproc)

      - name: Generate SHA256 for firmware binary
        run: |
          sha256sum Release/sip_periph.bin | awk '{print tolower($1)}' > Release/sip_periph.bin.sha256
          echo "SHA256:"
          cat Release/sip_periph.bin.sha256

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sip_periph-release-${{ github.sha }}
          path: |
            Release/sip_periph.elf
            Release/sip_periph.hex
            Release/sip_periph.bin
            Release/sip_periph.map
            Release/sip_periph.bin.sha256
          if-no-files-found: error
          retention-days: 30
